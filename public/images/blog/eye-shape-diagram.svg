<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
  <title>Six eye shapes — lash style match guide for My Lash House Chiang Mai</title>
  <desc>Diagram showing six eye shapes (single eyelid, double eyelid, downturned, round, hooded, wide-set) with the recommended My Lash House lash extension style for each.</desc>

  <defs>
    <style>
      .label-th { font-size: 17px; font-weight: 600; fill: #2a2a2a; }
      .label-en { font-size: 13px; font-weight: 400; fill: #6b6b6b; letter-spacing: 0.3px; }
      .style-rec { font-size: 12px; font-weight: 500; fill: #8a6d3b; font-style: italic; }
      .eye-line { fill: none; stroke: #2a2a2a; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .eye-fill { fill: #f7f3ee; stroke: #2a2a2a; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .iris { fill: #2a2a2a; }
      .lash { fill: none; stroke: #2a2a2a; stroke-width: 1.4; stroke-linecap: round; }
      .crease { fill: none; stroke: #6b6b6b; stroke-width: 1; stroke-linecap: round; stroke-dasharray: 0; opacity: 0.7; }
      .frame-title { font-size: 22px; font-weight: 600; fill: #1a1a1a; letter-spacing: 0.5px; }
      .frame-sub { font-size: 13px; font-weight: 400; fill: #6b6b6b; letter-spacing: 0.4px; }
    </style>
  </defs>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" class="frame-title">Eye shape → lash style match</text>
  <text x="450" y="58" text-anchor="middle" class="frame-sub">A starting point. Final mapping happens in person at My Lash House.</text>

  <!-- Cell 1: Single eyelid (monolid) -->
  <g transform="translate(80, 110)">
    <!-- eye outline: smooth almond, no crease above -->
    <path class="eye-fill" d="M 10 30 Q 75 -2, 140 30 Q 75 60, 10 30 Z" />
    <circle class="iris" cx="75" cy="30" r="9" />
    <!-- lashes -->
    <g class="lash">
      <line x1="22" y1="22" x2="20" y2="10" />
      <line x1="35" y1="14" x2="33" y2="2" />
      <line x1="50" y1="9" x2="48" y2="-3" />
      <line x1="65" y1="6" x2="63" y2="-6" />
      <line x1="80" y1="6" x2="80" y2="-6" />
      <line x1="95" y1="9" x2="97" y2="-3" />
      <line x1="110" y1="14" x2="113" y2="2" />
      <line x1="125" y1="22" x2="128" y2="10" />
    </g>
    <text x="75" y="92" text-anchor="middle" class="label-th">ตาชั้นเดียว</text>
    <text x="75" y="110" text-anchor="middle" class="label-en">Single eyelid (monolid)</text>
    <text x="75" y="130" text-anchor="middle" class="style-rec">Wispy / Light Volume</text>
  </g>

  <!-- Cell 2: Double eyelid -->
  <g transform="translate(305, 110)">
    <path class="eye-fill" d="M 10 30 Q 75 -2, 140 30 Q 75 62, 10 30 Z" />
    <!-- crease line -->
    <path class="crease" d="M 22 18 Q 75 4, 128 18" />
    <circle class="iris" cx="75" cy="30" r="9" />
    <g class="lash">
      <line x1="22" y1="22" x2="20" y2="10" />
      <line x1="35" y1="14" x2="33" y2="2" />
      <line x1="50" y1="9" x2="48" y2="-3" />
      <line x1="65" y1="6" x2="63" y2="-6" />
      <line x1="80" y1="6" x2="80" y2="-6" />
      <line x1="95" y1="9" x2="97" y2="-3" />
      <line x1="110" y1="14" x2="113" y2="2" />
      <line x1="125" y1="22" x2="128" y2="10" />
    </g>
    <text x="75" y="92" text-anchor="middle" class="label-th">ตาสองชั้น</text>
    <text x="75" y="110" text-anchor="middle" class="label-en">Double eyelid</text>
    <text x="75" y="130" text-anchor="middle" class="style-rec">Classic Volume / Hybrid</text>
  </g>

  <!-- Cell 3: Downturned -->
  <g transform="translate(530, 110)">
    <!-- outer corner sits lower than inner -->
    <path class="eye-fill" d="M 10 22 Q 75 -2, 140 38 Q 75 60, 10 22 Z" />
    <path class="crease" d="M 22 14 Q 75 2, 128 26" />
    <circle class="iris" cx="73" cy="28" r="9" />
    <g class="lash">
      <line x1="22" y1="14" x2="20" y2="2" />
      <line x1="35" y1="8" x2="33" y2="-4" />
      <line x1="50" y1="5" x2="48" y2="-7" />
      <line x1="65" y1="4" x2="63" y2="-8" />
      <line x1="80" y1="6" x2="80" y2="-8" />
      <line x1="95" y1="11" x2="97" y2="-3" />
      <line x1="110" y1="18" x2="115" y2="4" />
      <line x1="125" y1="28" x2="132" y2="14" />
    </g>
    <text x="75" y="92" text-anchor="middle" class="label-th">ตาตก</text>
    <text x="75" y="110" text-anchor="middle" class="label-en">Downturned</text>
    <text x="75" y="130" text-anchor="middle" class="style-rec">Mega Volume, cat-eye</text>
  </g>

  <!-- Cell 4: Round -->
  <g transform="translate(80, 350)">
    <path class="eye-fill" d="M 10 35 Q 75 -10, 140 35 Q 75 75, 10 35 Z" />
    <path class="crease" d="M 22 18 Q 75 0, 128 18" />
    <circle class="iris" cx="75" cy="35" r="11" />
    <g class="lash">
      <line x1="22" y1="22" x2="20" y2="8" />
      <line x1="35" y1="11" x2="33" y2="-3" />
      <line x1="50" y1="3" x2="48" y2="-11" />
      <line x1="65" y1="-2" x2="63" y2="-16" />
      <line x1="80" y1="-3" x2="80" y2="-17" />
      <line x1="95" y1="-2" x2="97" y2="-16" />
      <line x1="110" y1="3" x2="113" y2="-11" />
      <line x1="125" y1="11" x2="128" y2="-3" />
    </g>
    <text x="75" y="105" text-anchor="middle" class="label-th">ตากลม</text>
    <text x="75" y="123" text-anchor="middle" class="label-en">Round</text>
    <text x="75" y="143" text-anchor="middle" class="style-rec">Russian Volume, doll-eye</text>
  </g>

  <!-- Cell 5: Hooded -->
  <g transform="translate(305, 350)">
    <!-- inner eye outline -->
    <path class="eye-fill" d="M 10 30 Q 75 -2, 140 30 Q 75 60, 10 30 Z" />
    <!-- hood: extra lid skin partially covering the upper line -->
    <path d="M 6 30 Q 75 -22, 144 30 L 144 18 Q 75 -2, 6 18 Z" fill="#e8dfd0" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <circle class="iris" cx="75" cy="30" r="9" />
    <g class="lash">
      <line x1="22" y1="22" x2="20" y2="10" />
      <line x1="35" y1="14" x2="33" y2="2" />
      <line x1="50" y1="9" x2="48" y2="-3" />
      <line x1="65" y1="6" x2="63" y2="-8" />
      <line x1="80" y1="6" x2="80" y2="-10" />
      <line x1="95" y1="9" x2="97" y2="-5" />
      <line x1="110" y1="14" x2="113" y2="2" />
      <line x1="125" y1="22" x2="128" y2="10" />
    </g>
    <text x="75" y="105" text-anchor="middle" class="label-th">ตาหลบใน</text>
    <text x="75" y="123" text-anchor="middle" class="label-en">Hooded</text>
    <text x="75" y="143" text-anchor="middle" class="style-rec">Wispy Volume</text>
  </g>

  <!-- Cell 6: Wide-set (two eyes with extra space between) -->
  <g transform="translate(530, 350)">
    <!-- left eye -->
    <g transform="translate(-26, 0)">
      <path class="eye-fill" d="M 0 30 Q 40 6, 80 30 Q 40 56, 0 30 Z" />
      <path class="crease" d="M 8 22 Q 40 12, 72 22" />
      <circle class="iris" cx="40" cy="30" r="7" />
    </g>
    <!-- right eye -->
    <g transform="translate(96, 0)">
      <path class="eye-fill" d="M 0 30 Q 40 6, 80 30 Q 40 56, 0 30 Z" />
      <path class="crease" d="M 8 22 Q 40 12, 72 22" />
      <circle class="iris" cx="40" cy="30" r="7" />
    </g>
    <!-- spacing indicator -->
    <line x1="60" y1="30" x2="92" y2="30" stroke="#a89e8d" stroke-width="1" stroke-dasharray="3,3" />
    <text x="75" y="80" text-anchor="middle" class="label-th">ตาห่าง</text>
    <text x="75" y="98" text-anchor="middle" class="label-en">Wide-set</text>
    <text x="75" y="118" text-anchor="middle" class="style-rec">Hybrid, inner-corner weight</text>
  </g>

  <!-- footer -->
  <text x="450" y="600" text-anchor="middle" class="frame-sub">My Lash House · San Klang, Chiang Mai · mylashhouse.com</text>
</svg>
