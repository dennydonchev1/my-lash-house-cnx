<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Eye almond shape, brand pink -->
  <ellipse cx="256" cy="290" rx="180" ry="80" fill="none" stroke="#ec478f" stroke-width="22" stroke-linecap="round"/>

  <!-- Iris -->
  <circle cx="256" cy="290" r="40" fill="#ec478f"/>

  <!-- Upper lashes, radiating up and outward -->
  <!-- Center lash (longest, vertical) -->
  <line x1="256" y1="210" x2="256" y2="100" stroke="#ec478f" stroke-width="20" stroke-linecap="round"/>

  <!-- Right side lashes (cat-eye flick) -->
  <line x1="296" y1="216" x2="320" y2="118" stroke="#ec478f" stroke-width="20" stroke-linecap="round"/>
  <line x1="334" y1="222" x2="384" y2="130" stroke="#ec478f" stroke-width="20" stroke-linecap="round"/>
  <line x1="372" y1="234" x2="446" y2="170" stroke="#ec478f" stroke-width="20" stroke-linecap="round"/>

  <!-- Left side lashes -->
  <line x1="216" y1="216" x2="192" y2="118" stroke="#ec478f" stroke-width="20" stroke-linecap="round"/>
  <line x1="178" y1="222" x2="128" y2="130" stroke="#ec478f" stroke-width="20" stroke-linecap="round"/>
  <line x1="140" y1="234" x2="66" y2="170" stroke="#ec478f" stroke-width="20" stroke-linecap="round"/>
</svg>
